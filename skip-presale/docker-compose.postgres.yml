services:
  postgres:
    image: postgres:16-alpine
    container_name: skip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skip
      POSTGRES_USER: skip
      POSTGRES_PASSWORD: skip_dev_password
    ports:
      - "5432:5432"
    volumes:
      - skip_postgres_data:/var/lib/postgresql/data

volumes:
  skip_postgres_data:
